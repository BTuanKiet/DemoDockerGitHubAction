<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giới thiệu bản thân</title>
    <style>
        body {font-family: Arial, sans-serif; background: #f4f4f9; margin: 0; padding: 0;}
        .container {max-width: 760px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 28px;}
        h1 {margin-top: 0; color: #2f5d9f;}
        p {line-height: 1.6;}
        .meta {margin: 10px 0 20px; color: #555;}
        ul {list-style: disc inside; padding-left: 0;}
        li {margin: 6px 0;}
    </style>
</head>
<body>
<div class="container">
    <h1>Xin chào, tôi là <span th:text="${fullName}">Tên của bạn</span>!</h1>
    <p class="meta" th:text="${title}">Chức danh của bạn</p>
    <p th:text="${bio}">Giới thiệu ngắn về bản thân.</p>

    <h2>Thông tin liên hệ</h2>
    <ul>
        <li><strong>Địa điểm:</strong> <span th:text="${location}">...</span></li>
        <li><strong>Email:</strong> <span th:text="${email}">...</span></li>
        <li><strong>Phone:</strong> <span th:text="${phone}">...</span></li>
    </ul>

    <h2>Kỹ năng</h2>
    <ul>
        <li th:each="skill : ${skills}" th:text="${skill}">Kỹ năng</li>
    </ul>
</div>
</body>
</html>
