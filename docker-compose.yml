version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: mydb
      MYSQL_USER: kiet
      MYSQL_PASSWORD: 123456
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    image: btuankiet/buituankietjavadocker
    container_name: java-app
    depends_on:
      - mysql
    ports:
      - "8080:8080"

volumes:
  mysql_data: